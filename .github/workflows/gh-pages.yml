name: gh-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gh-pages.yml"
      - "docs/ui-design/Yuuzu-IDE - Home.html"
      - "docs/ui-design/colors_and_type.css"
      - "docs/ui-design/Yuuzu-IDE.standalone.html"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          cp "docs/ui-design/Yuuzu-IDE - Home.html" _site/index.html
          cp "docs/ui-design/colors_and_type.css" _site/colors_and_type.css
          cp "docs/ui-design/Yuuzu-IDE.standalone.html" _site/Yuuzu-IDE.standalone.html
          touch _site/.nojekyll

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish GitHub Pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
