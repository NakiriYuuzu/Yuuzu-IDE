[package]
name = "yuuzu-ide"
version = "0.1.0"
description = "Yuuzu-IDE desktop application"
authors = ["Yuuzu"]
edition = "2021"

[lib]
name = "yuuzu_ide_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }

[dev-dependencies]
tempfile = "3.27.0"
